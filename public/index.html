<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Produtos</title>
    <link rel="stylesheet" href="styles.css"> <!-- CSS externo -->
</head>
<body>
    <header>
        <h1>Cadastro de Produtos</h1> <!-- título principal -->
    </header>

    <main>
        <!-- Formulário -->
        <section class="form-section">
            <h2 id="form-title">Novo Produto</h2>
            <form id="product-form">
                <input type="hidden" id="product-id" /> <!-- usado para edição -->
                <div class="form-group">
                    <label for="name">Nome *</label>
                    <input type="text" id="name" required placeholder="Nome do produto" />
                </div>
                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" placeholder="Descrição opcional"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Preço (R$) *</label>
                        <input type="number" id="price" required min="0" step="0.01" placeholder="0,00" />
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantidade *</label>
                        <input type="number" id="quantity" required min="0" placeholder="0" />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none">Cancelar</button>
                </div>
            </form>
        </section>

        <!-- Lista de produtos -->
        <section class="list-section">
            <h2>Produtos Cadastrados</h2>
            <div id="loading" class="loading">Carregando...</div>
            <div id="empty" class="empty" style="display:none">Nenhum produto cadastrado ainda.</div>
            <div id="products-list" class="products-grid"></div>
        </section>
    </main>

    <!-- Notificação -->
    <div id="toast" class="toast"></div>

    <!-- Script JS -->
    <script src="app.js"></script>
</body>
</html>
