<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="icon">📦</div>
  <div>
    <h1>Cadastro de Produtos</h1>
    <p>Gerenciamento de estoque e produtos</p>
  </div>
</header>

<main>
  <div class="card form-section">
    <div class="card-header">
      <span>✏️</span>
      <h2 id="form-title">Novo Produto</h2>
    </div>
    <div class="card-body">
      <form id="product-form">
        <input type="hidden" id="product-id" />

        <div class="form-group">
          <label>Nome <span class="req">*</span></label>
          <input type="text" id="name" required placeholder="Ex: Camiseta Polo Azul" />
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea id="description" placeholder="Detalhes opcionais do produto..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Preço <span class="req">*</span></label>
            <div class="input-prefix">
              <span>R$</span>
              <input type="number" id="price" required min="0" step="0.01" placeholder="0,00" />
            </div>
          </div>
          <div class="form-group">
            <label>Quantidade <span class="req">*</span></label>
            <input type="number" id="quantity" required min="0" placeholder="0" />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">💾 Salvar Produto</button>
          <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none">✕ Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="list-section">
    <div class="stats-bar">
      <div class="stat-card blue">
        <div class="stat-label">Total de Produtos</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Valor em Estoque</div>
        <div class="stat-value" id="stat-valor">R$ 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Itens em Estoque</div>
        <div class="stat-value" id="stat-qty">0</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>📋</span>
        <h2>Produtos Cadastrados</h2>
        <span class="badge" id="badge-count">0 itens</span>
      </div>
      <div class="card-body">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="Buscar produto..." />
        </div>
        <div id="loading" class="loading-state">Carregando produtos...</div>
        <div id="empty" class="empty-state" style="display:none">
          <div class="empty-icon">📭</div>
          <p>Nenhum produto cadastrado ainda.<br/>Use o formulário ao lado para adicionar!</p>
        </div>
        <div id="products-list" class="products-list"></div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
